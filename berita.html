<!DOCTYPE html>
<html>
<head>
  <title>Berita Konstruksi</title>
</head>
<body>

<h2>Berita Konstruksi</h2>
<div id="berita">Loading...</div>

<script>
const rss = "https://api.rss2json.com/v1/api.json?rss_url=https://news.google.com/rss/search?q=konstruksi+indonesia";

fetch(rss)
  .then(res => res.json())
  .then(data => {
    let isi = "";

    data.items.slice(0,5).forEach(item => {
      isi += `
        <h3>${item.title}</h3>
        <p>${item.description.substring(0,100)}...</p>
        <a href="${item.link}" target="_blank">Baca selengkapnya</a>
        <hr>
      `;
    });

    document.getElementById("berita").innerHTML = isi;
  })
  .catch(err => {
    document.getElementById("berita").innerHTML = "Gagal memuat berita";
  });
</script>

</body>
</html>
