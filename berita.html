<script>
const rss = "https://api.allorigins.win/raw?url=https://news.google.com/rss/search?q=konstruksi+indonesia&hl=id&gl=ID&ceid=ID:id";

fetch(rss)
  .then(response => response.text())
  .then(str => new window.DOMParser().parseFromString(str, "text/xml"))
  .then(data => {
    const items = data.querySelectorAll("item");
    let html = "";

    if (items.length === 0) {
      document.getElementById("berita").innerHTML = "Tidak ada berita ditemukan";
      return;
    }

    items.forEach((el, i) => {
      if (i < 5) {
        html += `
          <div style="margin-bottom:20px;">
            <h3>${el.querySelector("title").textContent}</h3>
            <p>${el.querySelector("description").textContent.substring(0,120)}...</p>
            <a href="${el.querySelector("link").textContent}" target="_blank">
              Baca selengkapnya
            </a>
          </div>
        `;
      }
    });

    document.getElementById("berita").innerHTML = html;
  })
  .catch(() => {
    document.getElementById("berita").innerHTML = "Gagal memuat berita";
  });
</script>
